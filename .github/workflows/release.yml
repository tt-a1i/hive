name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: pnpm vitest run --no-file-parallelism --maxWorkers=1 --testTimeout=60000 --hookTimeout=60000
        if: runner.os != 'Windows'
      - run: pnpm test:windows
        if: runner.os == 'Windows'
      - run: pnpm pack:check
      - run: pnpm pack:smoke

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify release tag
        run: |
          node - <<'NODE'
          const fs = require('node:fs')
          const pkg = require('./package.json')
          const tag = process.env.GITHUB_REF_NAME
          const expected = `v${pkg.version}`

          if (tag !== expected) {
            throw new Error(`Release tag ${tag} does not match package version ${expected}`)
          }

          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8')
          if (!changelog.includes(`## ${pkg.version} -`)) {
            throw new Error(`CHANGELOG.md is missing an entry for ${pkg.version}`)
          }
          NODE
      - run: pnpm build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
